name: Build and analyze with SonarQube Cloud
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    types: [opened, synchronize, reopened]
jobs:
  build:
    name: Build and analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Importante para un análisis preciso
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'temurin'
      
      # PASO CRÍTICO: Compilar el código Java para generar los .class
      - name: Compile Java project
        run: |
          # Crea un directorio para los archivos compilados
          mkdir -p build/classes
          # Compila todos los archivos .java del proyecto
          # Asume que tu código fuente está en ./src
          javac -d build/classes $(find ./src -name "*.java")
      
      - name: Cache SonarQube packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
      
      # PASO PRINCIPAL: Ejecutar el análisis con SonarScanner
      - name: SonarQube Cloud Scan
        uses: SonarSource/sonarqube-scan-action@v4
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
