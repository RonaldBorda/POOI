name: Build and analyze with SonarQube Cloud
on: 
  push:
    branches: [ "main", "master" ]
  pull_request:
    types: [opened, synchronize, reopened]
jobs:
  build:
    name: Build and analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'temurin'
      
      # Compilar todos los archivos .java de la raíz
      - name: Compile Java project
        run: |
          # Crear directorio para archivos compilados
          mkdir -p build/classes
          # Compilar todos los archivos .java en la raíz
          javac -d build/classes *.java
      
      - name: Cache SonarQube packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
      
      # Ejecutar análisis de SonarQube
      - name: SonarQube Cloud Scan
        uses: SonarSource/sonarqube-scan-action@v4
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
